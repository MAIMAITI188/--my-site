user nobody nogroup;
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /app/nginx-mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 60M;
    client_body_buffer_size 1m;
    client_body_temp_path /tmp/nginx-client-body 1 2;

    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    upstream php_backend {
        server 127.0.0.1:9000;
    }

    server {
        listen 3000 default_server;
        server_name _;
        
        root /app;
        index WZZT.html index.html index.php;
        absolute_redirect off;
        port_in_redirect off;
        include /app/nginx-security-headers.conf;

        # Static files
        location ~* ^/(?!(?:data|images/chat)/).*\.(jpg|jpeg|png|gif|webp|avif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            include /app/nginx-security-headers.conf;
            access_log off;
        }

        location ~ ^/data/chat(?:-[A-Za-z0-9_-]+)?\.json$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* ^/(?:Dockerfile|Procfile|start\.sh|nginx-fastcgi_params|nginx-mime\.types|[^/]+\.(?:conf|json|toml|md|zip))$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 允许前端GET方式访问/data目录下的json文件
        location ~ ^/data/(?:gallery|lottery)\.json$ {
            allow all;
            default_type application/json;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            include /app/nginx-security-headers.conf;
        }

        location ~ ^/data/gallery-images/.*\.(jpg|jpeg|png|gif|webp|avif)$ {
            allow all;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
            include /app/nginx-security-headers.conf;
        }

        location ~ ^/images/chat/.*\.(jpg|jpeg|png|gif|webp)$ {
            allow all;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
            access_log off;
            include /app/nginx-security-headers.conf;
        }

        location ~ ^/images/chat/ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location = /api/chat.php {
            client_max_body_size 6M;
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_hide_header X-Powered-By;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /app/nginx-fastcgi_params;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        }

        # 后台写入 API：与 /admin/ 使用同一组服务器级 Basic Auth
        location = /admin/api/save-lottery.php {
            include /app/.deploy/nginx-admin-auth.conf;
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_hide_header X-Powered-By;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /app/nginx-fastcgi_params;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param REMOTE_USER $remote_user;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }

        location = /admin/api/save-gallery.php {
            include /app/.deploy/nginx-admin-auth.conf;
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_hide_header X-Powered-By;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /app/nginx-fastcgi_params;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param REMOTE_USER $remote_user;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }

        location = /admin/api/upload-gallery-image.php {
            include /app/.deploy/nginx-admin-auth.conf;
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_hide_header X-Powered-By;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /app/nginx-fastcgi_params;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param REMOTE_USER $remote_user;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }

        location = /admin/api/chat-admin.php {
            include /app/.deploy/nginx-admin-auth.conf;
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_hide_header X-Powered-By;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /app/nginx-fastcgi_params;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param REMOTE_USER $remote_user;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }

        # Protect admin pages. Set ADMIN_AUTH_USER / ADMIN_AUTH_PASSWORD in Dokploy.
        location = /admin {
            return 302 /admin/HTadmin.html;
        }

        location ^~ /admin/ {
            include /app/.deploy/nginx-admin-auth.conf;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            include /app/nginx-security-headers.conf;
            try_files $uri $uri/ =404;
        }

        # No public PHP entrypoints are required outside the admin API.
        location ~ \.php$ {
            return 404;
        }

        # Protect sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to data directory直接禁止其他类型
        location /data {
            deny all;
        }

        # HTML files
        location ~ \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            include /app/nginx-security-headers.conf;
        }

        # Default
        location / {
            include /app/.deploy/nginx-admin-root.conf;
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
    }
}
