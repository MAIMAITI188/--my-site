[global]
daemonize = no
error_log = /dev/stderr
log_level = warning

[www]
listen.backlog = -1
listen = 9000
listen.backlog = -1
user = nobody
group = nogroup
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500
pm.status_path = /status

; Security
php_admin_value[disable_functions] = system,exec,shell_exec,passthru,proc_open,proc_nice,proc_terminate,proc_get_status,popen,pcntl_exec
php_admin_flag[allow_url_fopen] = off
php_admin_value[upload_tmp_dir] = /tmp

; Performance
php_value[memory_limit] = 256M
php_value[max_execution_time] = 300
php_value[post_max_size] = 50M
php_value[upload_max_filesize] = 50M

catch_workers_output = yes
