<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>新港天天彩</title>
<style>
*{box-sizing:border-box}

:root{
  --site-width:640px;
  --site-gap:18px;
  --brand:#10c463;
  --brand-dark:#0d9d4f;
  --bg:#eef1f5;
  --muted:#6b7f72;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial,"Microsoft YaHei",sans-serif;
  color:#1f2d24;
  -webkit-text-size-adjust:100%;
}

.page{
  max-width:var(--site-width);
  margin:0 auto;
  min-height:100vh;
}

.header{
  padding:16px 18px;
  background:linear-gradient(135deg,#18d26f,#0ea84f);
  color:#fff;
}

.header-inner{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  position:relative;
}

.header-brand{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:0;
  gap:14px;
}

.header-logo{
  width:52px;
  height:52px;
  flex:0 0 52px;
  display:block;
  object-fit:contain;
  border-radius:50%;
  background:#fff;
  box-shadow:0 6px 16px rgba(0,0,0,.18);
}

.header-title{
  font-size:26px;
  font-weight:bold;
  line-height:1.1;
  letter-spacing:1px;
  text-align:center;
}

.header-domain{
  margin-top:5px;
  font-size:14px;
  line-height:1;
  font-weight:bold;
  letter-spacing:0;
  opacity:.9;
  text-align:center;
}

.chat-link{
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  background:rgba(255,255,255,.92);
  color:#0d8b46;
  font-size:15px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.api-box{
  margin:var(--site-gap);
  height:250px;
  border:1px solid rgba(16,196,99,.28);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(16,185,129,.1);
}

.api-frame{
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:transparent;
}

.tool-box{
  padding:0 var(--site-gap) 18px;
}

.tool-btn{
  width:100%;
  border:0;
  padding:15px 0;
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font-size:19px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,.12);
}

.section-title{
  margin:0 var(--site-gap) 14px;
  padding:12px;
  background:#fff;
  border-left:6px solid var(--brand);
  font-size:20px;
  font-weight:bold;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,.05);
}

.gallery{
  display:block;
  -webkit-column-count:2;
  column-count:2;
  -webkit-column-gap:16px;
  column-gap:16px;
  padding:0 var(--site-gap) 26px;
}

.gallery-card{
  display:inline-block;
  width:100%;
  min-width:0;
  margin:0 0 16px;
  -webkit-column-break-inside:avoid;
  break-inside:avoid;
  break-inside:avoid-column;
  page-break-inside:avoid;
  vertical-align:top;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  text-decoration:none;
  color:inherit;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
  transition:.2s;
  -webkit-tap-highlight-color:transparent;
}

@media(hover:hover) and (pointer:fine){
  .gallery-card:hover{
    transform:translateY(-4px);
  }
}

@media(hover:none), (pointer:coarse){
  .gallery-card{
    transition:none;
  }

  .gallery-card:hover{
    transform:none;
  }
}

.gallery-media{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f7f6;
  line-height:0;
}

.gallery-media picture{
  display:block;
  width:100%;
}

.gallery-image{
  width:100%;
  max-width:none;
  height:auto;
  display:block;
  margin:0 auto;
  background:#f5f7f6;
  cursor:zoom-in;
}

.gallery-placeholder{
  min-height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:28px 18px;
  background:linear-gradient(135deg,#edf8f0,#dff2e4);
  color:#78907d;
  font-size:14px;
  line-height:1.6;
}

.gallery-placeholder.is-error{
  border:1px dashed #e6b4a8;
  background:#fff4f1;
  color:#b24b39;
}

.gallery-placeholder.is-hidden{
  display:none;
}

.empty-box{
  column-span:all;
  width:100%;
  padding:26px 18px;
  border:1px dashed #caddce;
  border-radius:14px;
  background:#fff;
  text-align:center;
  color:var(--muted);
  line-height:1.7;
}

.pick-page{
  display:none;
  max-width:var(--site-width);
  margin:0 auto;
  min-height:100vh;
  background:#fff;
}

.pick-header{
  height:54px;
  background:var(--brand);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-size:20px;
  font-weight:bold;
}

.back-btn{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  border:0;
  background:rgba(255,255,255,.2);
  color:#fff;
  font-size:16px;
  padding:7px 12px;
  border-radius:8px;
  cursor:pointer;
}

.pick-frame{
  width:100%;
  height:calc(100vh - 54px);
  border:0;
  display:block;
  background:#fff;
}

.lightbox{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(10,16,12,.82);
  z-index:9999;
  cursor:zoom-out;
}

.lightbox.is-open{
  display:flex;
}

.lightbox-image{
  max-width:calc(100vw - 36px);
  max-height:calc(100vh - 86px);
  width:auto;
  height:auto;
  display:block;
  object-fit:contain;
  border-radius:10px;
  box-shadow:0 18px 48px rgba(0,0,0,.35);
  background:#fff;
  cursor:zoom-in;
}

.lightbox-image.is-hidden{
  display:none;
}

.lightbox-close{
  position:absolute;
  top:18px;
  right:18px;
  width:42px;
  height:42px;
  border:0;
  border-radius:999px;
  background:rgba(255,255,255,.16);
  color:#fff;
  font-size:26px;
  line-height:1;
  cursor:pointer;
}

.lightbox-open{
  position:absolute;
  left:18px;
  bottom:18px;
  padding:9px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.92);
  color:#0c6d38;
  font-size:14px;
  font-weight:bold;
  text-decoration:none;
  cursor:pointer;
}

@media(max-width:520px){
  :root{--site-gap:12px}
  .header{
    padding:14px 12px;
  }
  .header-inner{
    gap:10px;
  }
  .header-brand{
    gap:10px;
  }
  .header-logo{
    width:44px;
    height:44px;
    flex-basis:44px;
  }
  .header-title{
    font-size:22px;
  }
  .chat-link{
    min-height:34px;
    padding:0 11px;
    font-size:14px;
  }
  .api-box{height:190px}
  .tool-box{padding:0 var(--site-gap) 14px}
  .tool-btn{
    padding:13px 0;
    font-size:17px;
    border-radius:9px;
  }
  .section-title{
    margin:0 var(--site-gap) 12px;
    padding:10px 12px;
    font-size:18px;
  }
  .gallery{
    -webkit-column-count:2;
    column-count:2;
    -webkit-column-gap:12px;
    column-gap:12px;
    padding:0 var(--site-gap) 18px;
  }
  .gallery-card{margin-bottom:12px}
  .gallery-placeholder{
    min-height:88px;
    padding:14px 8px;
    font-size:12px;
  }
  .lightbox{
    padding:12px;
  }
  .lightbox-image{
    max-width:calc(100vw - 24px);
    max-height:calc(100vh - 78px);
    border-radius:10px;
  }
  .lightbox-close{
    top:10px;
    right:10px;
    width:38px;
    height:38px;
    font-size:22px;
  }
  .lightbox-open{
    left:12px;
    bottom:12px;
    padding:8px 12px;
    font-size:13px;
  }
}
</style>
<script defer src="https://umami.hkxc888.com/script.js" data-website-id="9c54c717-a529-46d8-839e-5e3badee27f7"></script>
</head>
<body>

<div class="page" id="mainPage">
  <div class="header">
    <div class="header-inner">
      <div class="header-brand">
        <img class="header-logo" src="assets/hk-logo.png" alt="香港紫荆花标志">
        <div>
          <div class="header-title">新港图库</div>
          <div class="header-domain">hkxc888.com</div>
        </div>
      </div>
      <a class="chat-link" href="chat.html">聊天室</a>
    </div>
  </div>

  <div class="api-box">
    <iframe class="api-frame" id="lotteryFrame" src="index.html?embed=1" title="开奖直播"></iframe>
  </div>

  <div class="tool-box">
    <button class="tool-btn" onclick="openPickPage()">挑码助手</button>
  </div>

  <div class="section-title">新港图库</div>
  <div class="gallery" id="gallery"></div>
</div>

<div class="pick-page" id="pickPage">
  <div class="pick-header">
    <button class="back-btn" onclick="backMainPage()">返回</button>
    挑码助手
  </div>
  <iframe class="pick-frame" src="TMZS.html" title="挑码助手"></iframe>
</div>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close preview">X</button>
  <a class="lightbox-open" id="lightboxOpen" href="#">打开原图</a>
  <img class="lightbox-image" id="lightboxImage" alt="">
</div>

<script>
function openPickPage(){
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("pickPage").style.display = "block";
  window.scrollTo(0,0);
}

function backMainPage(){
  document.getElementById("pickPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
  window.scrollTo(0,0);
}

if(/[?&]demo(?:=|&|$)/.test(window.location.search)){
  document.getElementById("lotteryFrame").src = "index.html?embed=1&demo=1";
}

var gallery = document.getElementById("gallery");
var lightbox = document.getElementById("lightbox");
var lightboxImage = document.getElementById("lightboxImage");
var lightboxClose = document.getElementById("lightboxClose");
var lightboxOpen = document.getElementById("lightboxOpen");
var SAFE_IMAGE_DATA_RE = /^data:image\/(?:png|jpe?g|webp|avif|gif);base64,/i;

function escapeHtml(value){
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function hasUnsafeUrlChars(value){
  return /[\u0000-\u001f\u007f<>"']/.test(String(value || ""));
}

function normalizeImageSrc(value){
  var clean = String(value || "").trim().replace(/\\/g, "/");
  if(!clean || hasUnsafeUrlChars(clean)){
    return "";
  }

  if(SAFE_IMAGE_DATA_RE.test(clean)){
    return clean;
  }

  if(/^https?:\/\//i.test(clean)){
    return clean;
  }

  if((clean.indexOf("images/gallery/") === 0 || clean.indexOf("./images/gallery/") === 0 || clean.indexOf("data/gallery-images/") === 0 || clean.indexOf("./data/gallery-images/") === 0 || clean.indexOf("/data/gallery-images/") === 0) && clean.indexOf("..") === -1){
    return /^[a-z0-9/_\-.%]+$/i.test(clean) ? clean : "";
  }

  return "";
}

function getGalleryImageSources(item){
  item = item || {};
  var original = normalizeImageSrc(item.image);
  var thumb = normalizeImageSrc(item.thumb) || original;
  var thumbAvif = normalizeImageSrc(item.thumbAvif);
  return { original, thumb, thumbAvif };
}

function normalizeLinkHref(value){
  var clean = String(value || "").trim();
  if(!clean || hasUnsafeUrlChars(clean)){
    return "";
  }

  if(/^https?:\/\//i.test(clean) || clean.indexOf("#") === 0 || clean.indexOf("./") === 0){
    return clean;
  }

  if(clean.indexOf("/") === 0 && clean.indexOf("//") !== 0){
    return clean;
  }

  return "";
}

function openLightbox(src, alt){
  if(!src){
    return;
  }

  lightboxImage.classList.remove("is-hidden");
  lightboxImage.src = src;
  lightboxImage.alt = alt || "";
  lightboxOpen.href = src;
  lightbox.classList.add("is-open");
  lightbox.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
}

function closeLightbox(){
  lightbox.classList.remove("is-open");
  lightbox.setAttribute("aria-hidden", "true");
  lightboxImage.classList.remove("is-hidden");
  lightboxImage.removeAttribute("src");
  lightboxImage.alt = "";
  lightboxOpen.href = "#";
  document.body.style.overflow = "";
}

function renderEmpty(message){
  gallery.innerHTML = '<div class="empty-box">' + message + '</div>';
}

function sameImageUrl(left, right){
  try{
    return new URL(left, window.location.href).href === new URL(right, window.location.href).href;
  }catch(error){
    return left === right;
  }
}

function handleGalleryImageError(image){
  var original = image.getAttribute("data-original") || "";
  var triedOriginal = image.getAttribute("data-tried-original") === "1";
  if(original && !sameImageUrl(image.src, original) && !triedOriginal){
    image.setAttribute("data-tried-original", "1");
    if(image.parentNode && image.parentNode.tagName && image.parentNode.tagName.toLowerCase() === "picture"){
      var sources = image.parentNode.querySelectorAll("source");
      for(var index = 0; index < sources.length; index += 1){
        sources[index].parentNode.removeChild(sources[index]);
      }
    }
    image.src = original;
    return;
  }

  var media = image.closest ? image.closest(".gallery-media") : image.parentNode;
  if(media){
    media.innerHTML = '<div class="gallery-placeholder is-error">图片文件不存在<br>请在后台重新上传并同步</div>';
  }
  if(!gallery.querySelector(".gallery-card")){
    renderEmpty("图库图片暂时无法显示。<br>请在后台重新上传图片并同步服务器。");
  }
}

function buildCard(item){
  var title = escapeHtml(item.title || "未命名图片");
  var sources = getGalleryImageSources(item);
  var linkHref = normalizeLinkHref(item.link);
  var avifSource = sources.thumbAvif
    ? '<source srcset="' + escapeHtml(sources.thumbAvif) + '" type="image/avif">'
    : '';
  var image = sources.original
    ? '<div class="gallery-media"><picture>' + avifSource + '<img class="gallery-image" src="' + escapeHtml(sources.thumb) + '" data-original="' + escapeHtml(sources.original) + '" alt="' + title + '" loading="lazy" decoding="async" onerror="handleGalleryImageError(this)"></picture></div>'
    : '<div class="gallery-placeholder">这条数据还没有填写图片路径</div>';

  if(linkHref){
    return '<a class="gallery-card" href="' + escapeHtml(linkHref) + '" target="_blank" rel="noopener noreferrer">' + image + '</a>';
  }

  return '<div class="gallery-card">' + image + '</div>';
}

function renderGalleryItems(items){
  if(!Array.isArray(items)){
    renderEmpty("图库数据读取失败。<br>请检查 <code>data/gallery.json</code> 是否存在，或 JSON 格式是否正确。");
    return;
  }

  var list = items
    .filter(function(item){ return item && item.enabled !== false; })
    .sort(function(a, b){ return Number(b.sort || 0) - Number(a.sort || 0); });

  if(!list.length){
    renderEmpty("图库目前还没有图片。");
    return;
  }

  gallery.innerHTML = list.map(function(item){ return buildCard(item); }).join("");
}

function fetchGalleryJson(done){
  if(window.fetch){
    fetch("data/gallery.json", { cache:"no-store" })
      .then(function(response){
        if(!response.ok){
          throw new Error("HTTP " + response.status);
        }
        return response.json();
      })
      .then(done)
      .catch(function(){
        done(null);
      });
    return;
  }

  var request = new XMLHttpRequest();
  request.open("GET", "data/gallery.json?t=" + Date.now(), true);
  request.onreadystatechange = function(){
    if(request.readyState !== 4){
      return;
    }

    if(request.status < 200 || request.status >= 300){
      done(null);
      return;
    }

    try{
      done(JSON.parse(request.responseText));
    }catch(error){
      done(null);
    }
  };
  request.send();
}

function loadGallery(){
  if(window.location.protocol === "file:"){
    renderEmpty("你现在是直接双击打开页面。<br>这种方式通常读不出 <code>data/gallery.json</code>。<br>请用本地服务器预览，或者部署上线后再看。");
    return;
  }

  fetchGalleryJson(function(items){
    if(!items){
      renderEmpty("图库数据读取失败。<br>请检查 <code>data/gallery.json</code> 是否存在，或 JSON 格式是否正确。");
      return;
    }

    renderGalleryItems(items);
  });
}

function closestElement(start, selector){
  var node = start;
  while(node && node !== document){
    var matches = node.matches || node.msMatchesSelector || node.webkitMatchesSelector;
    if(matches && matches.call(node, selector)){
      return node;
    }
    node = node.parentNode;
  }
  return null;
}

loadGallery();

gallery.addEventListener("click", function(event){
  var image = closestElement(event.target, ".gallery-image");
  if(!image){
    return;
  }

  event.preventDefault();
  openLightbox(image.getAttribute("data-original") || image.currentSrc || image.src, image.alt);
});

lightboxImage.addEventListener("error", function(){
  lightboxImage.classList.add("is-hidden");
  closeLightbox();
});

lightbox.addEventListener("click", function(event){
  if(event.target === lightbox || event.target === lightboxClose){
    closeLightbox();
  }
});

lightboxOpen.addEventListener("click", function(event){
  event.preventDefault();
  event.stopPropagation();
  var href = lightboxOpen.getAttribute("href");
  if(href && href !== "#"){
    window.location.href = href;
  }
});

lightboxImage.addEventListener("click", function(event){
  event.stopPropagation();
  if(lightboxImage.src){
    window.location.href = lightboxImage.src;
  }
});

document.addEventListener("keydown", function(event){
  if(event.key === "Escape" && lightbox.classList.contains("is-open")){
    closeLightbox();
  }
});
</script>

</body>
</html>
